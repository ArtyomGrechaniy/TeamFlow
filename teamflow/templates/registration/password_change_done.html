{% extends 'base.html' %}

{% block title %}
  Пароль изменён | TeamFlow
{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-8 col-lg-6">
    <div class="card border-0">
      <div class="card-body p-4 p-md-5 text-center">

        <div class="mb-3">
          <i class="bi bi-check-circle fs-1 text-success"></i>
        </div>

        <h1 class="h3 mb-3">Пароль успешно изменён</h1>

        <p class="text-muted mb-4">
          Новый пароль сохранён. Теперь ты можешь продолжить работу
          с командами, задачами и расходами.
        </p>

        <div class="d-grid gap-2">
          <a href="{% url 'profile:profile' request.user.username %}" class="btn btn-primary btn-lg">
            <i class="bi bi-person-circle me-1"></i>
            Вернуться в профиль
          </a>

          <a href="{% url 'core:home' %}" class="btn btn-outline-secondary">
            На главную
          </a>
        </div>

      </div>
    </div>
  </div>
</div>
{% endblock %}
