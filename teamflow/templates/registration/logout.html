{% extends 'base.html' %}

{% block title %}Выход из аккаунта — TeamFlow{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">

            <div class="card shadow-lg border-0">
                <div class="card-body text-center p-5">
                    
                    <div class="mb-4">
                        <i class="bi bi-box-arrow-right" style="font-size: 4.5rem; color: #dc3545;"></i>
                    </div>
                    
                    <h3 class="mb-3">Вы действительно хотите выйти?</h3>
                    <p class="text-muted mb-4">
                        Вы выйдете из аккаунта <strong>@{{ user.username }}</strong><br>
                        Чтобы вернуться, нужно будет войти заново.
                    </p>

                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-danger btn-lg">
                                <i class="bi bi-box-arrow-right me-2"></i>Да, выйти
                            </button>
                            
                            <a href="{% url 'profile:profile' username=user.username %}" 
                               class="btn btn-outline-secondary btn-lg">
                                Отмена
                            </a>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
