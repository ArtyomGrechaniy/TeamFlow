{% extends 'base.html' %}
{% block title %}{{ page_title }}{% endblock %}
{% block content %}
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-6">
        <div class="card shadow-sm">
          <div class="card-header {{ header_class }} text-white">
            <h4 class="mb-0">{{ icon }} {{ page_title }}</h4>
          </div>
          <div class="card-body p-4">
            <form method="post">
              {% csrf_token %}
              {{ form.as_p }}
              <div class="d-grid gap-2 mt-4">
                <button type="submit" class="btn {{ button_class }} btn-lg">{{ submit_text }}</button>
                <a href="{{ cancel_url }}" class="btn btn-outline-secondary">Отмена</a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
